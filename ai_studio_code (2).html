<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Hayatta Kalma Oyunu (Gelişmiş Versiyon)</title>
    <style>
        /* Modern Karanlık Tema Değişkenleri */
        :root {
            --bg-color: #090d16;
            --card-bg: #111827;
            --border-color: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 70px; /* Admob alanı boşluğu */
        }

        /* Oyun Konteyneri (Başlangıçta Gizli) */
        .game-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: calc(100vh - 70px);
        }

        /* Ekran Yapıları */
        .screen {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.4s ease-out;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 24px;
            text-align: center;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 15px;
        }

        /* Üst Bilgi Satırı */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .day-counter {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Yardım Paketi Butonu (Parlayan Efektli) */
        .btn-help {
            background: linear-gradient(135deg, var(--accent-yellow), #d97706);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .btn-help:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            animation: none !important;
        }

        .btn-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* Dinamik Durum Barları */
        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-bar-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .bar-outer {
            height: 12px;
            background-color: #090d16;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #1f2937;
        }

        .bar-inner {
            height: 100%;
            width: 100%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        #bar-can .bar-inner {
            background: linear-gradient(90deg, var(--accent-red), #ff6b6b);
        }

        #bar-aclik .bar-inner {
            background: linear-gradient(90deg, var(--accent-yellow), #fbbf24);
        }

        #bar-special .bar-inner {
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green));
        }

        /* Envanter Alanı */
        .inventory-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .inventory-title {
            font-weight: bold;
            color: var(--accent-cyan);
        }

        .inventory-items {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .inventory-item-tag {
            background-color: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .empty-inventory {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Olay Bildirim ve Şans Kutusu */
        .action-log {
            background-color: rgba(6, 182, 212, 0.1);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
            line-height: 1.4;
            animation: slideDown 0.3s ease;
        }

        .action-log.critical {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .action-log.info {
            background-color: rgba(6, 182, 212, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .story-box {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            min-height: 110px;
        }

        /* Butonlar */
        .btn {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            outline: none;
        }

        .btn:hover {
            background-color: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .btn-green {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .btn-green:hover {
            background-color: var(--accent-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .btn-red {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .btn-red:hover {
            background-color: var(--accent-red);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .choice-btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .death-title {
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .cause-text {
            color: var(--text-secondary);
            text-align: center;
            font-style: italic;
        }

        /* Sahte Reklam Modalı */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(9, 13, 22, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .ad-box {
            background-color: var(--card-bg);
            border: 2px dashed var(--accent-cyan);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.2);
        }

        .ad-countdown {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent-cyan);
            margin: 20px 0;
        }

        /* Admob Banner */
        .admob-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #070a10;
            border-top: 1px solid var(--border-color);
            color: #4b5563;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- game-container başlangıçta gizli tutuluyor -->
    <div class="game-container hidden">
        
        <!-- Ekran 1: Evren Seçimi (hidden sınıfına sahip değil, ilk bu ekran açılacak) -->
        <div id="screen-universe-select" class="screen">
            <h1>HAYATTA KALMA OYUNU</h1>
            <p class="subtitle">Kaderini belirleyeceğin evreni seçerek maceraya başla:</p>
            <button class="btn" onclick="startUniverse('zombie')">🧟 Zombi Kıyameti</button>
            <button class="btn btn-green" onclick="startUniverse('cyberpunk')">🤖 Siberpunk İsyanı</button>
            <button class="btn" style="border-color: var(--accent-yellow); color: var(--accent-yellow);" onmouseover="this.style.backgroundColor='var(--accent-yellow)'; this.style.color='var(--bg-color)'" onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--accent-yellow)'" onclick="startUniverse('island')">🏝️ Issız Ada</button>
        </div>

        <!-- Ekran 2: Ana Oyun Ekranı (hidden olarak başlar) -->
        <div id="game-screen" class="screen hidden">
            <!-- Üst Bilgiler -->
            <div class="top-row">
                <div id="day-counter" class="day-counter">GÜN: <span id="day-count">1</span></div>
                <button id="btn-help" class="btn-help btn-pulse" onclick="watchHelpAd()">Yardım İste 🎁</button>
            </div>
            
            <!-- Durum Barları -->
            <div class="stats-container">
                <div class="stat-bar-group">
                    <div class="stat-labels">
                        <span>Can</span>
                        <span id="label-can">100%</span>
                    </div>
                    <div class="bar-outer" id="bar-can">
                        <div class="bar-inner" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="stat-bar-group">
                    <div class="stat-labels">
                        <span>Açlık</span>
                        <span id="label-aclik">100%</span>
                    </div>
                    <div class="bar-outer" id="bar-aclik">
                        <div class="bar-inner" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="stat-bar-group">
                    <div class="stat-labels">
                        <span id="label-special-name">Özel durum</span>
                        <span id="label-special">100%</span>
                    </div>
                    <div class="bar-outer" id="bar-special">
                        <div class="bar-inner" style="width: 100%;"></div>
                    </div>
                </div>
            </div>

            <!-- Envanter Bölümü -->
            <div class="inventory-container">
                <span class="inventory-title">Envanter:</span>
                <div id="inventory-items" class="inventory-items">
                    <span class="empty-inventory">Boş</span>
                </div>
            </div>

            <!-- Olay Bildirim Alanı (Şans & Eşya) -->
            <div id="action-log" class="action-log hidden"></div>

            <!-- Hikaye Alanı -->
            <div id="story-text" class="story-box">Hikaye yükleniyor...</div>

            <!-- Seçim Butonları -->
            <div class="choice-btn-container">
                <button id="btn-choice-a" class="btn" onclick="makeChoice(0)">Seçenek A</button>
                <button id="btn-choice-b" class="btn btn-green" onclick="makeChoice(1)">Seçenek B</button>
            </div>
        </div>

        <!-- Ekran 3: Ölüm Ekranı (hidden olarak başlar) -->
        <div id="death-screen" class="screen hidden">
            <h1 class="death-title">HAYATTA KALAMADINIZ!</h1>
            <p id="death-cause" class="cause-text">Ölüm sebebi.</p>
            <p id="death-stats" style="text-align: center; font-size: 15px; color: var(--text-primary);"></p>
            <button class="btn btn-green" onclick="watchAdAndRevive()">🎬 1 Reklam İzle ve Canlan</button>
            <button class="btn btn-red" onclick="returnToMenu()">Ana Menüye Dön</button>
        </div>

        <!-- Ekran 5: Sahte Reklam Modalı -->
        <div id="ad-modal" class="modal-overlay hidden">
            <div class="ad-box">
                <h3 id="ad-title" style="color: var(--accent-cyan);">Reklam İzleniyor</h3>
                <p style="font-size: 13px; color: var(--text-secondary); margin-top: 5px;">Lütfen bekleyin...</p>
                <div id="ad-countdown" class="ad-countdown">3</div>
                <p style="font-size: 11px; color: #4b5563;">[SAHTE REKLAM ALANI]</p>
            </div>
        </div>

    </div>

    <div class="admob-banner">[ADMOB BANNER REKLAM ALANI]</div>

                },
                {
                    text: "Hindistan cevizi ağacı buldun. Tepede olgun meyveler var.",
                    options: [
                        { text: "Ağaca tırmanıp meyveleri topla.", effects: { can: -20, special: 25 } },
                        { text: "Yere düşen eski meyveleri ara.", effects: { special: 15, aclik: -15 } }
                    ]
                },
                {
                    text: "Ormanın derinliklerinde küçük bir su birikintisi gördün.",
                    options: [
                        { text: "Suyu doğrudan kana kana iç.", effects: { special: 30, can: -20 } },
                        { text: "Suyu süzmek için yaprakları kullan.", effects: { aclik: -10, special: 20 } }
                    ]
                },
                {
                    text: "Zehirli bir yılan ayağının dibinde tıslıyor!",
                    options: [
                        { text: "Tahta bir sopayla yılanı vurmaya çalış.", effects: { can: -25, aclik: 20 } },
                        { text: "Hiç hareket etmeden beklemeyi dene.", effects: { special: -15 } }
                    ]
                },
                {
                    text: "Şiddetli bir rüzgar sığınağını yıkmak üzere. Geceyi donmadan geçirmek için ateşe ihtiyacın var.",
                    benefitItem: "Çakmak",
                    benefitText: "🎒 [Çakmak] sayesinde barınağında hemen sıcak bir ateş yaktın, fırtınayı sıfır hasarla atlattın!",
                    options: [
                        { text: "Fırtınada dışarı çıkıp sığınağı onar.", effects: { can: -20, special: 20 } },
                        { text: "Sığınağı boş verip kayanın arkasına saklan.", effects: { special: -25, aclik: -10 } }
                    ]
                },
                {
                    text: "Kumsalda paslı bir metal kutu buldun.",
                    options: [
                        { text: "Kutuyu taşla vurarak zorla aç.", effects: { special: 20, can: -15 }, grantItem: "Çakmak" },
                        { text: "Kutuyu fırlatıp sahilde dinlen.", effects: { can: 15, aclik: -15 } }
                    ]
                },
                {
                    text: "Ormanda yürürken ayağın bir çukura sıkıştı ve burkuldu.",
                    options: [
                        { text: "Kendi haline bırakıp yola devam et.", effects: { can: -20, aclik: -10 } },
                        { text: "Dinlenmek için bir gün feda et.", effects: { can: 20, special: -25 } }
                    ]
                },
                {
                    text: "Hava aniden aşırı ısındı ve terlemeye başladın.",
                    options: [
                        { text: "Serinlemek için denize gir.", effects: { special: -15, can: 15 } },
                        { text: "Büyük yaprakların altında gölgede bekle.", effects: { aclik: -10 } }
                    ]
                },
                {
                    text: "Gemi enkazından kıyıya vuran bir çanta gördün.",
                    options: [
                        { text: "Çantayı almak için dalgalarla mücadele et.", effects: { can: -25, special: 35 }, grantItem: "Olta" },
                        { text: "Çantayı akıntıya bırak, sahilde kal.", effects: { aclik: -10 } }
                    ]
                },
                {
                    text: "Nehir kenarında büyük bir balık sürüsünün yüzdüğünü fark ettin.",
                    benefitItem: "Olta",
                    benefitText: "🎒 [Olta] sayesinde yorulmadan nehirde devasa balıklar tuttun ve harika beslendin!",
                    options: [
                        { text: "Yalın elle balık tutmayı dene.", effects: { can: -20, aclik: 25 } },
                        { text: "Meyve toplamak için ormana dön.", effects: { aclik: 15, special: -10 } }
                    ]
                }
            ]
        };

        // --- OYUN DURUMU (STATE) ---
        let gameState = {
            universe: null,
            day: 1,
            can: 100,
            aclik: 100,
            special: 100,
            currentEvent: null,
            specialName: "",
            inventory: [],
            helpUsedToday: false
        };

        let lastEventIndex = -1;
        let lastSavedState = {};

        // --- EKRAN GEÇİŞ YÖNETİMİ ---
        function showScreen(screenId) {
            document.getElementById('screen-universe-select').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('death-screen').classList.add('hidden');

            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- EVREN SEÇİM EKRANINI GÖSTERME (AÇILIŞ DÜZELTMESİ) ---
        function showUniverseSelect() {
            document.querySelector('.game-container').classList.remove('hidden');
            showScreen('screen-universe-select');
        }

        // --- RASTGELE OLAY SEÇİCİ ---
        function getNextEvent() {
            const events = eventPool[gameState.universe];
            let newIndex = Math.floor(Math.random() * events.length);
            
            if (events.length > 1) {
                while (newIndex === lastEventIndex) {
                    newIndex = Math.floor(Math.random() * events.length);
                }
            }
            lastEventIndex = newIndex;
            return events[newIndex];
        }

        // --- OYUN BAŞLANGICI ---
        function startUniverse(universeName) {
            gameState.universe = universeName;
            gameState.day = 1;
            gameState.can = 100;
            gameState.aclik = 100;
            gameState.special = 100;
            gameState.inventory = [];
            gameState.helpUsedToday = false;
            lastEventIndex = -1;

            if (universeName === 'zombie') {
                gameState.specialName = "Cephane";
            } else if (universeName === 'cyberpunk') {
                gameState.specialName = "Enerji";
            } else if (universeName === 'island') {
                gameState.specialName = "Susuzluk";
            }

            gameState.currentEvent = getNextEvent();
            showScreen('game-screen');
            updateUI();
            updateInventoryUI();
            hideActionLog();
        }

        // --- ARAYÜZ (UI) GÜNCELLEME ---
        function updateUI() {
            document.getElementById('day-count').innerText = gameState.day;

            document.getElementById('label-can').innerText = gameState.can + "%";
            document.getElementById('bar-can').querySelector('.bar-inner').style.width = gameState.can + "%";

            document.getElementById('label-aclik').innerText = gameState.aclik + "%";
            document.getElementById('bar-aclik').querySelector('.bar-inner').style.width = gameState.aclik + "%";

            document.getElementById('label-special-name').innerText = gameState.specialName;
            document.getElementById('label-special').innerText = gameState.special + "%";
            document.getElementById('bar-special').querySelector('.bar-inner').style.width = gameState.special + "%";

            // Yardım Butonu Günlük Durum Kontrolü
            const helpBtn = document.getElementById('btn-help');
            if (gameState.helpUsedToday) {
                helpBtn.disabled = true;
                helpBtn.classList.remove('btn-pulse');
                helpBtn.innerText = "Kullanıldı 🎁";
            } else {
                helpBtn.disabled = false;
                helpBtn.classList.add('btn-pulse');
                helpBtn.innerText = "Yardım İste 🎁";
            }

            // Olay Bilgisi ve Özel Eşya Uyarısı
            const currentEvent = gameState.currentEvent;
            document.getElementById('story-text').innerText = currentEvent.text;
            document.getElementById('btn-choice-a').innerText = currentEvent.options[0].text;
            document.getElementById('btn-choice-b').innerText = currentEvent.options[1].text;

            // Eğer oyuncunun elinde olay için faydalı olan eşya varsa bildirim yap
            if (currentEvent.benefitItem && gameState.inventory.includes(currentEvent.benefitItem)) {
                showActionLog(currentEvent.benefitText, "info");
            } else {
                hideActionLog();
            }
        }

        // --- ENVANTER ARAYÜZÜNÜ GÜNCELLEME ---
        function updateInventoryUI() {
            const container = document.getElementById('inventory-items');
            container.innerHTML = "";

            if (gameState.inventory.length === 0) {
                container.innerHTML = '<span class="empty-inventory">Boş</span>';
            } else {
                gameState.inventory.forEach(item => {
                    const tag = document.createElement('span');
                    tag.className = 'inventory-item-tag';
                    tag.innerText = item;
                    container.appendChild(tag);
                });
            }
        }

        // --- AKSİYON BİLDİRİM KAYDI (LOG) ---
        function showActionLog(text, type) {
            const logEl = document.getElementById('action-log');
            logEl.className = "action-log"; // Sınıfları sıfırla
            logEl.classList.add(type);
            logEl.innerText = text;
            logEl.classList.remove('hidden');
        }

        function hideActionLog() {
            document.getElementById('action-log').classList.add('hidden');
        }

        // --- SEÇİM MANTIĞI VE SİSTEM ETKİLEŞİMLERİ ---
        function makeChoice(optionIndex) {
            // Canlanma durumu için yedekleme
            lastSavedState = {
                day: gameState.day,
                currentEvent: gameState.currentEvent,
                inventory: [...gameState.inventory]
            };

            const currentEvent = gameState.currentEvent;
            const option = currentEvent.options[optionIndex];

            // 1. Şans Faktörü (%20 Kritik Başarı Oranı)
            let isCritical = false;
            let hasBenefit = false;

            // Eğer eşya faydası zaten aktifse kritik başarıyla çakışmasın
            if (currentEvent.benefitItem && gameState.inventory.includes(currentEvent.benefitItem)) {
                hasBenefit = true;
            } else if (Math.random() < 0.20) {
                isCritical = true;
            }

            // 2. Etkileri Uygulama
            let effectLog = "";
            if (option.effects) {
                let changeCan = option.effects.can || 0;
                let changeAclik = option.effects.aclik || 0;
                let changeSpecial = option.effects.special || 0;

                if (hasBenefit) {
                    // Eşya varsa: Zararlı etkiler tamamen sıfırlanır, faydalı etkiler ikiye katlanır
                    changeCan = changeCan < 0 ? 0 : changeCan * 2;
                    changeAclik = changeAclik < 0 ? 0 : changeAclik * 2;
                    changeSpecial = changeSpecial < 0 ? 0 : changeSpecial * 2;
                } else if (isCritical) {
                    // Kritik başarı varsa: Pozitif gelen tüm kazanımlar ikiye katlanır
                    changeCan = changeCan > 0 ? changeCan * 2 : changeCan;
                    changeAclik = changeAclik > 0 ? changeAclik * 2 : changeAclik;
                    changeSpecial = changeSpecial > 0 ? changeSpecial * 2 : changeSpecial;
                    effectLog = "✨ KRİTİK BAŞARI! Şansın yaver gitti! Ekstra kaynak kazandın!";
                }

                gameState.can = Math.max(0, Math.min(100, gameState.can + changeCan));
                gameState.aclik = Math.max(0, Math.min(100, gameState.aclik + changeAclik));
                gameState.special = Math.max(0, Math.min(100, gameState.special + changeSpecial));
            }

            // 3. Eşya Kazanma Kontrolü
            if (option.grantItem && !gameState.inventory.includes(option.grantItem)) {
                gameState.inventory.push(option.grantItem);
                updateInventoryUI();
                effectLog = `🎁 Yeni Eşya Kazandın: [${option.grantItem}]!`;
            }

            // 4. Zorunlu Günlük Tüketim (Barlar seçim sonrasında her gün 5 puan azalır)
            gameState.can = Math.max(0, gameState.can - 5);
            gameState.aclik = Math.max(0, gameState.aclik - 5);
            gameState.special = Math.max(0, gameState.special - 5);

            // Yeni Gün Başlangıcı
            gameState.day += 1;
            gameState.helpUsedToday = false; // Yardım paketi hakkı her gün yenilenir

            // 5. Ölüm Koşulu Kontrolü
            if (gameState.can <= 0 || gameState.aclik <= 0 || gameState.special <= 0) {
                let cause = "Zorlu şartlara daha fazla dayanamadınız.";
                if (gameState.can <= 0) {
                    cause = "Aldığınız ölümcül hasarlar ve yaralar nedeniyle can verdiniz.";
                } else if (gameState.aclik <= 0) {
                    cause = "Açlıktan bitkin düşerek yaşam mücadelesini kaybettiniz.";
                } else if (gameState.special <= 0) {
                    if (gameState.universe === 'zombie') {
                        cause = "Cephaneniz bittiği için kendinizi koruyamadınız ve zombilere yem oldunuz.";
                    } else if (gameState.universe === 'cyberpunk') {
                        cause = "Sistem enerjiniz sıfırlandı ve tüm sibernetik donanımlarınız kalıcı olarak kapandı.";
                    } else if (gameState.universe === 'island') {
                        cause = "Dehidrasyon (susuzluk) nedeniyle bilincinizi kaybedip can verdiniz.";
                    }
                }

                document.getElementById('death-cause').innerText = cause;
                document.getElementById('death-stats').innerText = `${gameState.day}. günde hayata veda ettiniz.`;
                showScreen('death-screen');
                return;
            }

            // 6. Bir Sonraki Rastgele Olayı Yükleme
            gameState.currentEvent = getNextEvent();
            updateUI();

            // Seçim sonucuna bağlı özel log bildirimini ekranda göster
            if (effectLog !== "") {
                showActionLog(effectLog, isCritical ? "critical" : "info");
            }
        }

        // --- ÖDÜLLÜ YARDIM PAKETİ REKLAM SİSTEMİ ---
        function watchHelpAd() {
            if (gameState.helpUsedToday) return;

            const adModal = document.getElementById('ad-modal');
            const countdownEl = document.getElementById('ad-countdown');
            const adTitle = document.getElementById('ad-title');

            adTitle.innerText = "Yardım Paketi Yükleniyor";
            adModal.classList.remove('hidden');

            let timeLeft = 3;
            countdownEl.innerText = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownEl.innerText = timeLeft;
                } else {
                    clearInterval(interval);
                    adModal.classList.add('hidden');
                    applyHelpReward();
                }
            }, 1000);
        }

        function applyHelpReward() {
            // Yardım paketi barları +30 puan doldurur (En fazla %100)
            gameState.can = Math.min(100, gameState.can + 30);
            gameState.aclik = Math.min(100, gameState.aclik + 30);
            gameState.special = Math.min(100, gameState.special + 30);
            gameState.helpUsedToday = true;

            updateUI();
            showActionLog("🎁 Yardım Paketi Alındı: Tüm değerleriniz +30 artırıldı!", "critical");
        }

        // --- REKLAM İZLEYEREK CANLANMA (ÖLÜM EKRANI) ---
        function watchAdAndRevive() {
            const adModal = document.getElementById('ad-modal');
            const countdownEl = document.getElementById('ad-countdown');
            const adTitle = document.getElementById('ad-title');

            adTitle.innerText = "Reklam İzleniyor";
            adModal.classList.remove('hidden');

            let timeLeft = 3;
            countdownEl.innerText = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownEl.innerText = timeLeft;
                } else {
                    clearInterval(interval);
                    adModal.classList.add('hidden');
                    revivePlayer();
                }
            }, 1000);
        }

        function revivePlayer() {
            // Kaldığı gün, olay ve envanter yüklenir
            gameState.day = lastSavedState.day;
            gameState.currentEvent = lastSavedState.currentEvent;
            gameState.inventory = [...(lastSavedState.inventory || [])];
            gameState.helpUsedToday = false;
            
            // Tüm barlar güvenli devam için %50 düzeyine eşitlenir
            gameState.can = 50;
            gameState.aclik = 50;
            gameState.special = 50;

            showScreen('game-screen');
            updateUI();
            updateInventoryUI();
            showActionLog("❤️ Yeniden canlandınız! Mücadeleye kaldığınız yerden devam edin.", "info");
        }

        function returnToMenu() {
            showUniverseSelect();
        }

        // --- BAŞLATMA MANTIĞI (AÇILIŞ HATASINI GİDEREN TETİKLEYİCİ) ---
        window.onload = function() {
            showUniverseSelect();
        };
    </script>
</body>
</html>
